    </linearGradient>
  </defs>

  <rect x="8" y="8" width="624" height="144" rx="34" fill="url(#bg)" />
  <rect x="8" y="8" width="624" height="144" rx="34" fill="none" stroke="#334155" stroke-width="2" />
  <circle cx="610" cy="24" r="52" fill="#22d3ee" opacity="0.12" />

